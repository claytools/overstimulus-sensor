<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensory Volume Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>

<!-- Start with a visible default zone -->
<body class="green">
  <h1>Sensory Volume Monitor</h1>

  <div id="readout">
    <div id="volumeLevel">0</div>
    <div id="zoneLabel">GREEN</div>
  </div>

  <div id="settingsPanel">
    <label>Green Max: <input type="number" id="greenMax" value="30"></label>
    <label>Yellow Max: <input type="number" id="yellowMax" value="50"></label>
    <label>Orange Max: <input type="number" id="orangeMax" value="70"></label>
  </div>

  <div id="controls">
    <button id="startButton">Start Monitoring</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
