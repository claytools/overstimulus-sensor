<!DOCTYPE html>
<html>
<head>
  <title>Sensory Volume Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Sensory Volume Monitor</h1>

  <div id="colorDisplay" class="green">
    <h2 id="volumeLevel">0</h2>
  </div>

  <div id="settingsPanel">
  <label>Green Max: <input type="number" id="greenMax" value="30"></label>
  <label>Yellow Max: <input type="number" id="yellowMax" value="50"></label>
  <label>Orange Max: <input type="number" id="orangeMax" value="70"></label>
</div>

  <label for="sensitivity">Sensitivity</label>
  <input type="range" id="sensitivity" min="1" max="100" value="50">

  <br><br>

  <button id="startButton">Start Monitoring</button>

  <script src="script.js"></script>
</body>
</html>
